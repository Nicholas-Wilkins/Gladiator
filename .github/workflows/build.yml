name: Build and Release
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: gladiator-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: gladiator-windows-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: gladiator-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libssl-dev
          sudo apt-get install -y libappindicator3-dev 2>/dev/null || sudo apt-get install -y libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: gui/src-tauri
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            let cargo = fs.readFileSync('Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + process.argv[1] + '\"');
            fs.writeFileSync('Cargo.toml', cargo);
            const c = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            c.version = process.argv[1];
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
          " "$VERSION"

      - name: Configure Cargo retry
        shell: bash
        run: |
          mkdir -p ~/.cargo
          node -e "
            const fs = require('fs');
            fs.writeFileSync(require('os').homedir() + '/.cargo/config.toml',
              '[http]\nretry = 5\ntimeout = 120\n');
          "

      - name: Build
        run: npx tauri build
        working-directory: gui/src-tauri

      - name: Create Linux updater artifact
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd gui/src-tauri/target/release/bundle/appimage
          tar czf "Gladiator_${VERSION}_amd64.AppImage.tar.gz" "Gladiator_${VERSION}_amd64.AppImage"

      - name: List build output
        shell: bash
        run: ls -la gui/src-tauri/target/release/ 2>/dev/null || echo "No target/release directory"

      - name: List bundle output
        shell: bash
        run: find gui/src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle files found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: gui/src-tauri/target/release/bundle/

  build-backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: gladiator-backend-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          python install.py

      - name: Build standalone backend
        shell: bash
        run: |
          SEP=$([[ "${{ matrix.os }}" == "windows-latest" ]] && echo ";" || echo ":")
          pyinstaller --onefile \
            --name gladiator-backend \
            --add-data "gladiator_nn${SEP}gladiator_nn" \
            --add-data "gladiator_mini${SEP}gladiator_mini" \
            --add-data "gladiator_nn_mini${SEP}gladiator_nn_mini" \
            --hidden-import gladiator_nn \
            --hidden-import gladiator_mini \
            --hidden-import gladiator_nn_mini \
            --hidden-import main \
            --hidden-import main_nn \
            --hidden-import main_mini \
            --hidden-import main_nn_mini \
            --hidden-import export_bot \
            --hidden-import promote_bot \
            gladiator_api.py

      - name: Rename binary to match artifact name
        shell: bash
        run: |
          mv dist/gladiator-backend* "dist/${{ matrix.artifact-name }}"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Install Tauri CLI (for signer)
        run: npm install -g @tauri-apps/cli

      - name: Collect and sign artifacts
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Copy ALL installer/bundle files to a flat release dir
          mkdir -p release
          find . -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "gladiator-backend-*" \) -exec cp {} release/ \;

          # Re-structure into the layout scripts/release.sh expects, for signing
          mkdir -p bundle/appimage bundle/msi bundle/dmg
          find . -type d -name appimage -exec sh -c 'cp "$1"/* bundle/appimage/' _ {} \; 2>/dev/null || true
          find . -type d -name msi     -exec sh -c 'cp "$1"/* bundle/msi/'     _ {} \; 2>/dev/null || true
          find . -type d -name dmg     -exec sh -c 'cp "$1"/* bundle/dmg/'     _ {} \; 2>/dev/null || true

          # Run the release script against the re-structured bundle dir
          BUNDLE_DIR="$PWD/bundle" bash scripts/release.sh "$VERSION" > bundle/latest.json

          # Copy generated files (tar.gz, latest.json) into the release dir
          find bundle -type f \( -name "*.tar.gz" -o -name "latest.json" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
