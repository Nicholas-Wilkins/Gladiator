name: Build and Release
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: gladiator-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: gladiator-windows-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: gladiator-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libssl-dev
          sudo apt-get install -y libappindicator3-dev 2>/dev/null || sudo apt-get install -y libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: gui/src-tauri
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            let cargo = fs.readFileSync('Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + process.argv[1] + '\"');
            fs.writeFileSync('Cargo.toml', cargo);
            const c = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            c.version = process.argv[1];
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
          " "$VERSION"

      - name: Configure Cargo retry
        shell: bash
        run: |
          mkdir -p ~/.cargo
          node -e "
            const fs = require('fs');
            fs.writeFileSync(require('os').homedir() + '/.cargo/config.toml',
              '[http]\nretry = 5\ntimeout = 120\n');
          "

      - name: Create backend source bundle (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p gui/src-tauri/backend
          7z a -tzip gui/src-tauri/backend/gladiator-backend-windows.zip \
            gladiator_api.py main.py main_nn.py main_mini.py main_nn_mini.py \
            export_bot.py promote_bot.py install.py \
            requirements.txt \
            gladiator/ gladiator_nn/ gladiator_mini/ gladiator_nn_mini/ || true

      - name: Download uv (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -sSLo uv-windows.zip \
            https://github.com/astral-sh/uv/releases/download/0.5.0/uv-x86_64-pc-windows-msvc.zip
          7z e uv-windows.zip -ogui/src-tauri/backend/ uv.exe -aoa
          rm -f uv-windows.zip

      - name: Strip pre-release suffix for Windows MSI compatibility
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        working-directory: gui/src-tauri
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            let cargo = fs.readFileSync('Cargo.toml', 'utf8');
            cargo = cargo.replace(/^(version = \"\d+\.\d+\.\d+).*\"$/m, '\$1\"');
            fs.writeFileSync('Cargo.toml', cargo);
            const c = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            c.version = c.version.replace(/^(\d+\.\d+\.\d+).*\$/, '\$1');
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
            console.log('Stripped pre-release suffix, version is now', c.version);
          "

      - name: Build
        run: npx tauri build
        working-directory: gui/src-tauri

      - name: Create Linux updater artifact
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd gui/src-tauri/target/release/bundle/appimage
          tar czf "Gladiator_${VERSION}_amd64.AppImage.tar.gz" "Gladiator_${VERSION}_amd64.AppImage"

      - name: Azure Login
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Sign Gladiator.exe with Azure Trusted Signing
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\gui\src-tauri\target\release
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows MSI installer
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\gui\src-tauri\target\release\bundle\msi
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows NSIS installer
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\gui\src-tauri\target\release\bundle\nsis
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create Windows portable zip
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd gui/src-tauri/target/release
          echo "Contents of target/release:"
          ls -la || true
          EXE=""
          [ -f "Gladiator.exe" ] && EXE="Gladiator.exe"
          [ -z "$EXE" ] && [ -f "gladiator-gui.exe" ] && EXE="gladiator-gui.exe"
          [ -z "$EXE" ] && EXE="$(ls *.exe 2>/dev/null | head -1)"
          if [ -z "$EXE" ]; then
            echo "ERROR: no .exe found in target/release" >&2
            echo "Trying broader search:" >&2
            find . -name "*.exe" -maxdepth 2 2>/dev/null || true
            exit 1
          fi
          echo "Packaging $EXE as portable zip..."
          7z a -tzip "Gladiator_${VERSION}_x64_portable.zip" "$EXE" -mx9
          mkdir -p bundle/nsis
          mv "Gladiator_${VERSION}_x64_portable.zip" bundle/nsis/

      - name: List build output
        shell: bash
        run: ls -la gui/src-tauri/target/release/ 2>/dev/null || echo "No target/release directory"

      - name: List bundle output
        shell: bash
        run: find gui/src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle files found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: gui/src-tauri/target/release/bundle/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Install Tauri CLI (for signer)
        run: npm install -g @tauri-apps/cli

      - name: Collect and sign artifacts
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Copy ALL installer/bundle files to a flat release dir
          mkdir -p release
          find . -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) -exec cp {} release/ \;

          # Re-structure into the layout scripts/release.sh expects, for signing
          mkdir -p bundle/appimage bundle/nsis bundle/dmg
          find . -type d -name appimage -exec sh -c 'cp "$1"/* bundle/appimage/' _ {} \; 2>/dev/null || true
          find . -type d -name nsis     -exec sh -c 'cp "$1"/* bundle/nsis/'     _ {} \; 2>/dev/null || true
          find . -type d -name dmg     -exec sh -c 'cp "$1"/* bundle/dmg/'     _ {} \; 2>/dev/null || true

          # Generate update notes from the tagged commit's message
          git log -1 --format="%s" > /tmp/update-notes.md

          # Generate GitHub release body from template
          sed "s/<version>/$VERSION/g" scripts/release-body.md > /tmp/release-body.md

          # Run the release script against the re-structured bundle dir
          BUNDLE_DIR="$PWD/bundle" bash scripts/release.sh "$VERSION" /tmp/update-notes.md > bundle/latest.json

          # Copy generated files (tar.gz, zip, latest.json) into the release dir
          find bundle -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "latest.json" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          draft: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
